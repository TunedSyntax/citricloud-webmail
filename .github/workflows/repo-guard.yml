name: Repo Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guard:
    name: Validate Repo Scope
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate repository guardrails
        run: node scripts/repo-guard.mjs --mode=repo