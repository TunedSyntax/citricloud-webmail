      url: https://staging.webmail.citricloud.com
    needs: build-and-push
    env:
      WEB_HOST: staging.webmail.citricloud.com
      API_HOST: api-staging.webmail.citricloud.com
      TLS_SECRET: citricloud-webmail-staging-tls
      API_TLS_SECRET: citricloud-webmail-api-staging-tls
      DEFAULT_NAMESPACE: citricloud-webmail-staging
      API_URL: ${{ secrets.API_URL }}
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      SESSION_ENCRYPTION_KEY: ${{ secrets.SESSION_ENCRYPTION_KEY }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA is required for Staging environment." >&2
            exit 1
          fi

          mkdir -p "$HOME/.kube"

          validate_kubeconfig() {
            KUBECONFIG="$1" kubectl config view >/dev/null 2>&1
          }

          if printf '%s' "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config" 2>/dev/null && validate_kubeconfig "$HOME/.kube/config"; then
            echo "Decoded base64 kubeconfig."
          elif printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config" && validate_kubeconfig "$HOME/.kube/config"; then
            echo "Using raw kubeconfig content."
          elif printf '%s' "$KUBE_CONFIG_DATA" | jq -r 'if type == "array" then .[] else error("not array") end' > "$HOME/.kube/config" 2>/dev/null && validate_kubeconfig "$HOME/.kube/config"; then
            echo "Using kubeconfig content from JSON array."
          else
            echo "KUBE_CONFIG_DATA is not valid base64, raw kubeconfig, or JSON-array kubeconfig content." >&2
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"

      - name: Validate environment secrets
        shell: bash
        run: |
          if [ -z "$API_URL" ]; then
            echo "API_URL must be set in the Staging environment secrets." >&2
            exit 1
          fi

          if [ -z "$SESSION_ENCRYPTION_KEY" ] || [ -z "$REDIS_PASSWORD" ]; then
            echo "SESSION_ENCRYPTION_KEY and REDIS_PASSWORD must be set in Staging secrets." >&2
            exit 1
          fi

      - name: Ensure GHCR pull secret
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          NAMESPACE="$DEFAULT_NAMESPACE"
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$NAMESPACE" \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          NAMESPACE="$DEFAULT_NAMESPACE"

          helm upgrade --install citricloud-webmail-staging deploy/helm/citricloud-webmail \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 5m \
            --set image.repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
            --set image.tag="$IMAGE_TAG" \
            --set ingress.host="$WEB_HOST" \
            --set ingress.tls.secretName="$TLS_SECRET" \
            --set publicApi.enabled=true \
            --set publicApi.host="$API_HOST" \
            --set publicApi.tls.secretName="$API_TLS_SECRET" \
            --set-string app.apiUrl="$API_URL" \
            --set-string secrets.sessionEncryptionKey="$SESSION_ENCRYPTION_KEY" \
            --set-string secrets.redisPassword="$REDIS_PASSWORD"

          kubectl -n "$NAMESPACE" rollout status deployment/citricloud-webmail --timeout=180s

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.build-and-push.outputs.is_stable == 'true'
    environment:
      name: prod
      url: https://webmail.citricloud.com
    needs: build-and-push
    env:
      WEB_HOST: webmail.citricloud.com
      API_HOST: api.webmail.citricloud.com
      TLS_SECRET: citricloud-webmail-tls
      API_TLS_SECRET: citricloud-webmail-api-tls
      DEFAULT_NAMESPACE: citricloud-webmail
      API_URL: ${{ secrets.API_URL }}
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      SESSION_ENCRYPTION_KEY: ${{ secrets.SESSION_ENCRYPTION_KEY }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA is required for Production environment." >&2
            exit 1
          fi

          mkdir -p "$HOME/.kube"

          validate_kubeconfig() {
            KUBECONFIG="$1" kubectl config view >/dev/null 2>&1
          }

          if printf '%s' "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config" 2>/dev/null && validate_kubeconfig "$HOME/.kube/config"; then
            echo "Decoded base64 kubeconfig."
          elif printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config" && validate_kubeconfig "$HOME/.kube/config"; then
            echo "Using raw kubeconfig content."
          elif printf '%s' "$KUBE_CONFIG_DATA" | jq -r 'if type == "array" then .[] else error("not array") end' > "$HOME/.kube/config" 2>/dev/null && validate_kubeconfig "$HOME/.kube/config"; then
            echo "Using kubeconfig content from JSON array."
          else
            echo "KUBE_CONFIG_DATA is not valid base64, raw kubeconfig, or JSON-array kubeconfig content." >&2
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"

      - name: Validate environment secrets
        shell: bash
        run: |
          if [ -z "$API_URL" ]; then
            echo "API_URL must be set in the Production environment secrets." >&2
            exit 1
          fi

          if [ -z "$SESSION_ENCRYPTION_KEY" ] || [ -z "$REDIS_PASSWORD" ]; then
            echo "SESSION_ENCRYPTION_KEY and REDIS_PASSWORD must be set in Production secrets." >&2
            exit 1
          fi

      - name: Ensure GHCR pull secret
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          NAMESPACE="$DEFAULT_NAMESPACE"
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$NAMESPACE" \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          NAMESPACE="$DEFAULT_NAMESPACE"

          helm upgrade --install citricloud-webmail deploy/helm/citricloud-webmail \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 5m \
            --set image.repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
            --set image.tag="$IMAGE_TAG" \
            --set ingress.host="$WEB_HOST" \
            --set ingress.tls.secretName="$TLS_SECRET" \
            --set publicApi.enabled=true \
            --set publicApi.host="$API_HOST" \
            --set publicApi.tls.secretName="$API_TLS_SECRET" \
            --set-string app.apiUrl="$API_URL" \
            --set-string secrets.sessionEncryptionKey="$SESSION_ENCRYPTION_KEY" \
            --set-string secrets.redisPassword="$REDIS_PASSWORD"

          kubectl -n "$NAMESPACE" rollout status deployment/citricloud-webmail --timeout=180s
