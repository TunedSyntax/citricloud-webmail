apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "citricloud-webmail.fullname" . }}
  labels:
    {{- include "citricloud-webmail.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "citricloud-webmail.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "citricloud-webmail.fullname" . }}
        {{- include "citricloud-webmail.labels" . | nindent 8 }}
    spec:
      {{- $webmailNodeSelector := .Values.webmail.nodeSelector | default .Values.nodeSelector }}
      {{- with $webmailNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webmail
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: SESSION_STORAGE
              value: redis
            - name: SESSION_TTL_SECONDS
              value: {{ .Values.session.ttlSeconds | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "citricloud-webmail.fullname" . }}-secrets
                  key: REDIS_URL
            - name: SESSION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "citricloud-webmail.fullname" . }}-secrets
                  key: SESSION_ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}