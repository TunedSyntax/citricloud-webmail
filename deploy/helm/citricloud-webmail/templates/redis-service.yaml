apiVersion: v1
kind: Service
metadata:
  name: {{ include "citricloud-webmail.fullname" . }}-redis-headless
  labels:
    {{- include "citricloud-webmail.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ include "citricloud-webmail.fullname" . }}-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "citricloud-webmail.fullname" . }}-redis
  labels:
    {{- include "citricloud-webmail.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "citricloud-webmail.fullname" . }}-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis