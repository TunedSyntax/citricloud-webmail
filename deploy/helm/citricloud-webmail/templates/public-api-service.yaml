{{- if .Values.publicApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "citricloud-webmail.fullname" . }}-public-api
  labels:
    {{- include "citricloud-webmail.labels" . | nindent 4 }}
    component: public-api
spec:
  type: LoadBalancer
  selector:
    app: {{ include "citricloud-webmail.fullname" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.publicApi.port }}
      targetPort: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
{{- end }}
