apiVersion: apps/v1
kind: Deployment
metadata:
  name: citricloud-webmail
  namespace: citricloud-webmail
  labels:
    app.kubernetes.io/name: citricloud-webmail
    app.kubernetes.io/part-of: citricloud-webmail
spec:
  replicas: 2
  selector:
    matchLabels:
      app: citricloud-webmail
  template:
    metadata:
      labels:
        app: citricloud-webmail
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: webmail
          image: ghcr.io/tunedsyntax/citricloud-webmail:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: SESSION_STORAGE
              value: redis
            - name: SESSION_TTL_SECONDS
              value: "86400"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: citricloud-webmail-secrets
                  key: REDIS_URL
            - name: SESSION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: citricloud-webmail-secrets
                  key: SESSION_ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi