apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citricloud-webmail
  namespace: citricloud-webmail
  labels:
    app.kubernetes.io/name: citricloud-webmail
    app.kubernetes.io/part-of: citricloud-webmail
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Routes webmail.citricloud.com exclusively to this namespace.
    # NEVER share this ingress with the citricloud (local) project.
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - <webmail-hostname>
        - <api-webmail-hostname>
      secretName: citricloud-webmail-tls
  rules:
    - host: <webmail-hostname>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: citricloud-webmail
                port:
                  number: 80
    - host: <api-webmail-hostname>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: citricloud-webmail
                port:
                  number: 80